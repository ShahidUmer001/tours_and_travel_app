name: tours_and_travel_app
description: "A premium tours and travel mobile application"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # CORE (TESTED)
  cupertino_icons: ^1.0.8
  provider: ^6.1.2

  # FIREBASE (TESTED)
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5

  # UI (TESTED)
  google_fonts: ^7.0.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # NAVIGATION (TESTED)
  go_router: ^14.0.1

  # UTILITIES (TESTED)
  http: ^1.6.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  url_launcher: ^6.2.2
  intl: ^0.19.0
  webview_flutter: ^4.4.2

  # MAPS (TESTED)
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1

  # TRAVEL SPECIFIC (TESTED)
  table_calendar: ^3.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/destinations/