name: tours_and_travel_app
description: "A premium tours and travel mobile application"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.9.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase Core - UPDATED VERSIONS
  firebase_core: ^4.3.0
  cloud_firestore: ^6.1.1
  firebase_auth: ^6.1.3
  firebase_storage: ^13.0.5

  # Google Services - UPDATED
  google_maps_flutter: ^2.14.0
  google_fonts: ^7.0.2

  # Location Services - UPDATED
  geolocator: ^14.0.2

  # UI Components
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # Utilities - UPDATED
  url_launcher: ^6.2.2
  http: ^1.6.0
  image_picker: ^1.0.4
  shared_preferences: ^2.2.2
  permission_handler: ^12.0.1

  # ESSENTIAL NEW DEPENDENCIES:
  awesome_dialog: ^3.3.0
  webview_flutter: ^4.4.2
  carousel_slider: ^5.1.1
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0  # For date formatting
  provider: ^6.1.2  # For state management

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/destinations/
    - assets/images/hotels/
    - assets/images/cars/